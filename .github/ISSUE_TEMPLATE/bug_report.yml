name: Bug report
description: Report a reproducible issue in experiments, scripts, or analysis output
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: A clear and concise description of the problem.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact commands/scripts and order.
      placeholder: |
        1. source ./setup.sh
        2. bash exp2-cache-hit.sh
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. Ubuntu 24.04

  - type: textarea
    id: logs
    attributes:
      label: Logs/output
      description: Paste relevant terminal output or excerpts.
      render: shell
