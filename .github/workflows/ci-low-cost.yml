name: CI (low-cost deterministic checks)

on:
  pull_request:
  push:
    branches: [main]

jobs:
  deterministic-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify key files exist
        run: |
          test -f README.md
          test -f CONTRIBUTING.md
          test -f AGENTS.md
          test -f analyze.py
          test -f compare.py

      - name: Python syntax check
        run: |
          python -m py_compile analyze.py
          python -m py_compile compare.py
          python -m py_compile exp17-semantic-threshold-simulation.py

      - name: Bash syntax check
        run: |
          for f in *.sh; do
            bash -n "$f"
          done
